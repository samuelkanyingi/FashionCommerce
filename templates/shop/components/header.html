<header class="main-header" x-data="{ mobileMenu: false }">
  <nav class="nav-container">
    <a href="{% url 'index' %}" class="logo">FashionHub</a>

    <!-- Navigation Menu -->
    <div class="nav-menu" :class="{ 'show': mobileMenu }">
      <a href="{% url 'women' %}" class="nav-link">Women</a>
      <a href="{% url 'men' %}" class="nav-link">Men</a>
      <a href="{% url 'reports' %}" class="nav-link">Reports</a>
      <a href="{% url 'order_history' %}" class="nav-link">
          <i class="fa fa-history"></i> Order History
      </a>

      <!-- Auth Section inside Menu for Mobile -->
      <div class="auth-section">
        {% if user.is_authenticated %}
          <span style="font-size: 0.9rem; color: #666;">Hi, {{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}" style="display:inline">
              {% csrf_token %}
              <button type="submit" class="logout-btn">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link" style="color: #04aa6d;">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>
</header>
