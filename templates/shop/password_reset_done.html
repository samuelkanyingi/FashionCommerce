{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - FashionHub</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="hero-section">
        <p>FashionHub</p> 
        <a href="{% url 'index' %}" class="btn-hero">Back to Home</a>
    </div>
    <div class="container">
        <div class="auth-card success-message">
            <div class="success-icon">
                <i class="fa fa-paper-plane-o"></i>
            </div>
            <h2>Check your email</h2>
            <p>We've sent you instructions on how to reset your password. If an account exists with that email, you should receive it shortly.</p>
            <p>If you don't see the email, please check your spam folder.</p>
            
            <div class="auth-links">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
