{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - FashionHub</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="hero-section">
        <p>FashionHub</p> 
        <a href="{% url 'index' %}" class="btn-hero">Back to Home</a>
    </div>
    <div class="container">
        <div class="auth-card success-message">
            <div class="success-icon">
                <i class="fa fa-check-circle"></i>
            </div>
            <h2>Password Reset!</h2>
            <p>Your password has been set. You may go ahead and log in now.</p>
            
            <div class="auth-links">
                <a href="{% url 'login' %}" class="submit-btn" style="display: block; text-decoration: none; color: white;">Log In</a>
            </div>
        </div>
    </div>
</body>
</html>
